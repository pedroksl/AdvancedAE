modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}"
license="${mod_license}"
updateJSONURL="https://mod-manifest.jarva.dev/manifest/curseforge/1084104/neoforge?version=26.1"
issueTrackerURL="https://github.com/pedroksl/AdvancedAE/issues"
displayURL="https://github.com/pedroksl/AdvancedAE"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    authors="${mod_authors}"
    description='''${mod_description}'''
    credits="Ridanisaurus Rid for texture style, Jm³ and Sea_Kerman for models"
    logoFile= "resources/logo.png"

[[mixins]]
    config="mixins.aae.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neoforge_version_range}"
ordering="NONE"
side="BOTH"
[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version}"
ordering="NONE"
side="BOTH"
[[dependencies.${mod_id}]]
modId="ae2"
type="required"
versionRange="${ae2_version}"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="ae2addonlib"
type="required"
versionRange="*"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="geckolib"
type="required"
versionRange="[${geckolib_version},)"
ordering="AFTER"
side="BOTH"
#[[dependencies.${mod_id}]]
#modId="ae2wtlib_api"
#type="REQUIRED"
#versionRange="*"
#ordering="BEFORE"
#side="BOTH"
[[dependencies.${mod_id}]]
modId="ae2wtlib"
type="OPTIONAL"
versionRange="[${ae2wtlib_version},)"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="jei"
type="OPTIONAL"
versionRange="[${jei_version},)"
ordering="AFTER"
side="BOTH"